<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Football Scoreboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    .scoreboard {
      max-width: 500px;
      margin: auto;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 40%;
      text-align: center;
    }

    .teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0;
    }

    .team {
      width: 40%;
    }

    .score {
      font-size: 48px;
      margin: 10px 0;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .timer {
      font-size: 24px;
      margin: 10px 0;
    }

    .half {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .events {
      margin-top: 20px;
      text-align: left;
    }

    .events ul {
      list-style: none;
      padding: 0;
    }

    .events li {
      padding: 5px;
      border-bottom: 1px solid #444;
    }

    @media (max-width: 600px) {
      .teams {
        flex-direction: column;
      }

      .team {
        width: 100%;
      }

      input {
        width: 80%;
      }
    }
  </style>
</head>
<body>

<div class="scoreboard">
  <h1>Football Scoreboard</h1>

  <div>
    <input id="homeName" placeholder="Home Team">
    <input id="awayName" placeholder="Away Team">
  </div>

  <div class="teams">
    <div class="team">
      <h2 id="homeDisplay">Home</h2>
      <div class="score" id="homeScore">0</div>
      <button onclick="addGoal('home')">+ Goal</button>
    </div>

    <div class="team">
      <h2 id="awayDisplay">Away</h2>
      <div class="score" id="awayScore">0</div>
      <button onclick="addGoal('away')">+ Goal</button>
    </div>
  </div>

  <div class="timer" id="timer">00:00</div>
  <div class="half" id="half">1st Half</div>

  <button onclick="startTimer()">Start</button>
  <button onclick="switchHalf()">Switch Half</button>
  <button onclick="reset()">Reset</button>

  <div class="events">
    <h3>Match Events</h3>
    <ul id="eventsList"></ul>
  </div>
</div>

<script>
  let homeScore = 0;
  let awayScore = 0;
  let seconds = 0;
  let timerInterval;
  let isSecondHalf = false;
  let events = [];

  function updateDisplay() {
    document.getElementById("homeDisplay").textContent =
      document.getElementById("homeName").value || "Home";

    document.getElementById("awayDisplay").textContent =
      document.getElementById("awayName").value || "Away";

    document.getElementById("homeScore").textContent = homeScore;
    document.getElementById("awayScore").textContent = awayScore;
  }

  function formatTime(sec) {
    const mins = Math.floor(sec / 60).toString().padStart(2, '0');
    const secs = (sec % 60).toString().padStart(2, '0');
    return `${mins}:${secs}`;
  }

  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById("timer").textContent = formatTime(seconds);
    }, 1000);
  }

  function switchHalf() {
    isSecondHalf = !isSecondHalf;
    document.getElementById("half").textContent =
      isSecondHalf ? "2nd Half" : "1st Half";
  }

  function addGoal(team) {
    const minute = Math.floor(seconds / 60);

    if (team === "home") {
      homeScore++;
      events.push(`${minute}' - ${document.getElementById("homeDisplay").textContent} goal`);
    } else {
      awayScore++;
      events.push(`${minute}' - ${document.getElementById("awayDisplay").textContent} goal`);
    }

    updateDisplay();
    renderEvents();
  }

  function renderEvents() {
    const list = document.getElementById("eventsList");
    list.innerHTML = "";

    // ✅ Oldest → Newest (no reverse, using push)
    events.forEach(event => {
      const li = document.createElement("li");
      li.textContent = event;
      list.appendChild(li);
    });
  }

  function reset() {
    homeScore = 0;
    awayScore = 0;
    seconds = 0;
    events = [];
    clearInterval(timerInterval);
    timerInterval = null;
    isSecondHalf = false;

    document.getElementById("timer").textContent = "00:00";
    document.getElementById("half").textContent = "1st Half";

    updateDisplay();
    renderEvents();
  }

  document.getElementById("homeName").addEventListener("input", updateDisplay);
  document.getElementById("awayName").addEventListener("input", updateDisplay);

  updateDisplay();
</script>

</body>
</html>
